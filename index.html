<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Gate Register</title>
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#1c2620">
<script src="https://cdnjs.cloudflare.com/ajax/libs/html5-qrcode/2.3.8/html5-qrcode.min.js"></script>
<style>
  :root{
    --ink:#1c2620;
    --paper:#f3efe6;
    --paper-dim:#e8e2d4;
    --rule:#c9c0a9;
    --stamp-in:#2d6a4f;
    --stamp-out:#9c3d3d;
    --accent:#b6862c;
    --mono:'Courier New', monospace;
    --serif:'Georgia', 'Times New Roman', serif;
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;background:var(--ink);font-family:var(--serif);}
  body{
    min-height:100vh;
    color:var(--ink);
    -webkit-tap-highlight-color:transparent;
  }
  #app{
    max-width:480px;
    margin:0 auto;
    min-height:100vh;
    background:var(--paper);
    background-image:
      repeating-linear-gradient(transparent 0px, transparent 27px, rgba(28,38,32,0.04) 28px);
    position:relative;
    padding-bottom:90px;
  }
  header.masthead{
    padding:22px 20px 16px;
    border-bottom:3px double var(--ink);
    text-align:center;
  }
  header.masthead h1{
    margin:0 0 2px;
    font-size:26px;
    letter-spacing:1px;
    font-weight:700;
  }
  header.masthead .sub{
    font-family:var(--mono);
    font-size:11px;
    color:#5b5141;
  }

  .screen{ padding:18px 20px; display:none; }
  .screen.active{ display:block; }

  /* Login screen */
  .ledger-card{
    background:var(--paper-dim);
    border:1px solid var(--rule);
    padding:20px;
    margin-top:14px;
  }
  .ledger-card h2{
    margin:0 0 14px;
    font-size:16px;
    letter-spacing:.5px;
  }
  label{
    display:block;
    font-family:var(--mono);
    font-size:11px;
    letter-spacing:1px;
    text-transform:uppercase;
    color:#5b5141;
    margin-bottom:5px;
  }
  input[type=text]{
    width:100%;
    padding:10px 8px;
    font-family:var(--serif);
    font-size:16px;
    border:none;
    border-bottom:2px solid var(--ink);
    background:transparent;
    margin-bottom:18px;
    color:var(--ink);
  }
  input[type=text]:focus{ outline:none; border-bottom-color:var(--accent); }

  button{
    font-family:var(--mono);
    cursor:pointer;
    border:none;
  }
  .btn-primary{
    width:100%;
    background:var(--ink);
    color:var(--paper);
    padding:14px;
    font-size:13px;
    letter-spacing:2px;
    text-transform:uppercase;
  }
  .btn-primary:active{ background:#000; }

  /* Home screen */
  .direction-toggle{
    display:flex;
    gap:0;
    margin:16px 0 20px;
    border:2px solid var(--ink);
  }
  .direction-toggle button{
    flex:1;
    padding:16px 0;
    background:transparent;
    font-size:14px;
    letter-spacing:2px;
    color:var(--ink);
    transition:all .15s;
  }
  .direction-toggle button.sel-in{ background:var(--stamp-in); color:#fff; }
  .direction-toggle button.sel-out{ background:var(--stamp-out); color:#fff; }
  .direction-toggle button + button{ border-left:2px solid var(--ink); }

  .scan-trigger{
    width:100%;
    background:var(--accent);
    color:var(--ink);
    padding:22px;
    font-size:15px;
    letter-spacing:2px;
    text-transform:uppercase;
    border:2px solid var(--ink);
  }
  .scan-trigger:active{ background:#a07424; }

  .who-strip{
    display:flex;
    justify-content:space-between;
    font-family:var(--mono);
    font-size:11px;
    color:#5b5141;
    margin-top:14px;
    padding-top:10px;
    border-top:1px dashed var(--rule);
  }
  .who-strip button{
    background:none;
    color:#5b5141;
    text-decoration:underline;
    font-size:11px;
  }

  /* Scanner overlay */
  #scanner-overlay{
    position:fixed; inset:0; background:#000; z-index:50;
    display:none; flex-direction:column;
  }
  #scanner-overlay.active{ display:flex; }
  #qr-reader{ width:100%; flex:1; }
  .scanner-top{
    padding:16px 20px; color:#f3efe6; font-family:var(--mono);
    display:flex; justify-content:space-between; align-items:center;
    background:#000;
  }
  .scanner-top .close-btn{ background:none; color:#f3efe6; font-size:22px; padding:0 8px; }
  .scanner-hint{
    text-align:center; color:#cfc7b3; font-family:var(--mono); font-size:11px;
    padding:14px; background:#000;
  }

  /* Confirm slip */
  #confirm-overlay{
    position:fixed; inset:0; background:rgba(0,0,0,.55); z-index:60;
    display:none; align-items:center; justify-content:center; padding:20px;
  }
  #confirm-overlay.active{ display:flex; }
  .slip{
    background:var(--paper);
    width:100%; max-width:380px;
    padding:22px;
    border:1px solid var(--ink);
    box-shadow:0 10px 30px rgba(0,0,0,.4);
  }
  .slip h3{
    margin:0 0 4px; font-size:13px; letter-spacing:2px; text-transform:uppercase;
    color:var(--accent); font-family:var(--mono);
  }
  .slip .big-stamp{
    font-size:20px; font-weight:700; margin-bottom:14px;
  }
  .slip .row{
    display:flex; justify-content:space-between;
    padding:7px 0; border-bottom:1px dashed var(--rule);
    font-size:13px;
  }
  .slip .row .k{ font-family:var(--mono); color:#5b5141; font-size:11px; text-transform:uppercase;}
  .slip .row .v.warn{ color:var(--stamp-out); font-weight:700; }
  .slip-actions{ display:flex; gap:10px; margin-top:18px; }
  .slip-actions button{ flex:1; padding:13px; font-size:12px; letter-spacing:1px; text-transform:uppercase; }
  .btn-ghost{ background:transparent; border:2px solid var(--ink); color:var(--ink); }
  .btn-confirm{ background:var(--ink); color:var(--paper); }
  .btn-confirm:disabled{ opacity:.4; }

  /* History */
  .log-entry{
    display:flex; justify-content:space-between; align-items:flex-start;
    padding:12px 0; border-bottom:1px solid var(--rule);
  }
  .log-entry .meta{ font-family:var(--mono); font-size:11px; color:#5b5141; }
  .log-entry .dc{ font-size:14px; font-weight:700; }
  .tag{
    font-family:var(--mono); font-size:10px; letter-spacing:1px; padding:3px 7px;
    text-transform:uppercase; color:#fff; flex-shrink:0; margin-left:8px;
  }
  .tag.in{ background:var(--stamp-in); }
  .tag.out{ background:var(--stamp-out); }
  .tag.pending{ background:#8a7d5f; }
  .empty-note{ font-family:var(--mono); font-size:12px; color:#9b9180; padding:30px 0; text-align:center; }

  nav.tabs{
    position:fixed; bottom:0; left:0; right:0;
    max-width:480px; margin:0 auto;
    background:var(--ink); display:flex;
  }
  nav.tabs button{
    flex:1; background:none; color:#9b9180; padding:14px 0;
    font-size:11px; letter-spacing:1.5px; text-transform:uppercase;
  }
  nav.tabs button.active{ color:var(--paper); border-top:2px solid var(--accent); }

  .toast{
    position:fixed; bottom:80px; left:50%; transform:translateX(-50%);
    background:var(--ink); color:var(--paper); padding:10px 18px;
    font-family:var(--mono); font-size:12px; border-radius:2px;
    z-index:80; opacity:0; transition:opacity .3s; max-width:90%; text-align:center;
  }
  .toast.show{ opacity:1; }

  .settings-link{ font-family:var(--mono); font-size:11px; color:#5b5141; text-decoration:underline; background:none; }
</style>
</head>
<body>
<div id="app">

  <header class="masthead">
    <h1>Gate Register</h1>
    <div class="sub">Delivery Challan · In / Out Log</div>
  </header>

  <!-- LOGIN -->
  <section class="screen active" id="screen-login">
    <div class="ledger-card">
      <h2 id="login-heading">Login</h2>
      <label>Employee Name</label>
      <input type="text" id="login-name" placeholder="e.g. Murugan">
      <label>Password</label>
      <input type="password" id="login-pass" placeholder="••••••">
      <button class="btn-primary" id="btn-login">Login</button>
      <div style="text-align:center; margin-top:16px;">
        <button id="btn-toggle-register" style="background:none; color:#5b5141; font-size:12px; text-decoration:underline;">Create new account</button>
      </div>
    </div>
  </section>

  <!-- HOME -->
  <section class="screen" id="screen-home">
    <div class="direction-toggle">
      <button id="dir-out">GATE OUT</button>
      <button id="dir-in">GATE IN</button>
    </div>
    <button class="scan-trigger" id="btn-scan">⬚ Scan DC QR Code</button>
    <div class="who-strip">
      <span id="who-label">—</span>
      <button id="btn-switch-user">logout</button>
    </div>
    <div class="who-strip" style="margin-top:6px;">
      <span id="sync-status">—</span>
    </div>
  </section>

  <!-- HISTORY -->
  <section class="screen" id="screen-history">
    <div id="history-list"></div>
  </section>

</div>

<!-- Scanner -->
<div id="scanner-overlay">
  <div class="scanner-top">
    <span>Point camera at the DC QR code</span>
    <button class="close-btn" id="btn-close-scanner">✕</button>
  </div>
  <div id="qr-reader"></div>
  <div class="scanner-hint">Scanning happens on this device only · no photo is stored</div>
</div>

<!-- Confirm slip -->
<div id="confirm-overlay">
  <div class="slip" id="slip-content"></div>
</div>

<nav class="tabs">
  <button class="active" data-tab="home">Register</button>
  <button data-tab="history">History</button>
</nav>

<div class="toast" id="toast"></div>

<script>
/* ---------- storage helpers ---------- */
const LS = {
  get(k, d=null){ try{ const v = localStorage.getItem(k); return v===null? d : JSON.parse(v); }catch(e){ return d; } },
  set(k,v){ localStorage.setItem(k, JSON.stringify(v)); }
};

const SHEET_URL = 'YOUR_GOOGLE_APPS_SCRIPT_URL_HERE'; // Replace with your Apps Script URL

function deviceId(){
  let id = LS.get('dc_device_id');
  if(!id){
    id = 'DEV-' + (crypto.randomUUID ? crypto.randomUUID().slice(0,8).toUpperCase() : Math.random().toString(36).slice(2,10).toUpperCase());
    LS.set('dc_device_id', id);
  }
  return id;
}

function generateOutwardNumber(){
  return 'OUT-' + new Date().getTime().toString(36).toUpperCase().slice(-6);
}

function toast(msg, ms=2200){
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  clearTimeout(t._timer);
  t._timer = setTimeout(()=>t.classList.remove('show'), ms);
}

/* ---------- state ---------- */
let direction = LS.get('dc_direction', 'OUT');
let pendingScan = null;
let html5QrCode = null;
let isRegisterMode = false;

/* ---------- screens ---------- */
function showScreen(name){
  document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
  document.getElementById('screen-'+name).classList.add('active');
  document.querySelectorAll('nav.tabs button').forEach(b=>b.classList.toggle('active', b.dataset.tab===name));
  if(name==='history') renderHistory();
}
document.querySelectorAll('nav.tabs button').forEach(b=>{
  b.addEventListener('click', ()=> showScreen(b.dataset.tab));
});

/* ---------- login & registration ---------- */
function toggleRegisterMode(){
  isRegisterMode = !isRegisterMode;
  const heading = document.getElementById('login-heading');
  const btn = document.getElementById('btn-login');
  const toggle = document.getElementById('btn-toggle-register');
  
  if(isRegisterMode){
    heading.textContent = 'Create Account';
    btn.textContent = 'Create Account';
    toggle.textContent = 'Already have an account? Login';
  } else {
    heading.textContent = 'Login';
    btn.textContent = 'Login';
    toggle.textContent = 'Create new account';
  }
}

document.getElementById('btn-toggle-register').addEventListener('click', toggleRegisterMode);

document.getElementById('btn-login').addEventListener('click', ()=>{
  const name = document.getElementById('login-name').value.trim();
  const pass = document.getElementById('login-pass').value.trim();
  
  if(!name || !pass){ toast('Enter name and password'); return; }
  
  if(isRegisterMode){
    const users = LS.get('dc_users', []);
    if(users.find(u => u.name.toLowerCase() === name.toLowerCase())){
      toast('Account already exists');
      return;
    }
    users.push({name, pass});
    LS.set('dc_users', users);
    toast('Account created! Login now.');
    isRegisterMode = false;
    toggleRegisterMode();
    document.getElementById('login-name').value = '';
    document.getElementById('login-pass').value = '';
  } else {
    const users = LS.get('dc_users', []);
    const user = users.find(u => u.name.toLowerCase() === name.toLowerCase() && u.pass === pass);
    if(!user){ toast('Invalid credentials'); return; }
    LS.set('dc_user', {name});
    refreshWhoLabel();
    boot();
  }
});

document.getElementById('btn-switch-user').addEventListener('click', ()=>{
  localStorage.removeItem('dc_user');
  document.getElementById('login-name').value = '';
  document.getElementById('login-pass').value = '';
  showScreen('login');
});

/* ---------- direction toggle ---------- */
function paintDirection(){
  document.getElementById('dir-out').classList.toggle('sel-out', direction==='OUT');
  document.getElementById('dir-in').classList.toggle('sel-in', direction==='IN');
}
document.getElementById('dir-out').addEventListener('click', ()=>{ direction='OUT'; LS.set('dc_direction',direction); paintDirection(); });
document.getElementById('dir-in').addEventListener('click', ()=>{ direction='IN'; LS.set('dc_direction',direction); paintDirection(); });

function refreshWhoLabel(){
  const u = LS.get('dc_user');
  document.getElementById('who-label').textContent = u ? `${u.name} · ${deviceId()}` : '—';
}

function updateSyncStatus(){
  const pendingCount = LS.get('dc_queue', []).length;
  document.getElementById('sync-status').textContent =
    (SHEET_URL !== 'YOUR_GOOGLE_APPS_SCRIPT_URL_HERE' ? 'Sheet syncing' : 'Sheet not configured') + (pendingCount? ` · ${pendingCount} pending` : '');
}

/* ---------- DC parsing & validation ---------- */
function parseDcText(text){
  let dc = null, date = null;

  // DC number: extract "I402600052" style or "DC-xxxx"
  const dcMatch = text.match(/I\d{9}|\b[A-Z]{1,5}\d{2,10}\b/i);
  if(dcMatch) dc = dcMatch[0].toUpperCase();

  // date: handle M/D/YYYY, MM/DD/YYYY, D-M-YYYY, etc
  const dateMatch = text.match(/(\d{1,2}[\/\-]\d{1,2}[\/\-]\d{2,4})/);
  if(dateMatch) date = dateMatch[0];

  return { dc, date, raw:text };
}

function validateDate(dstr){
  if(!dstr) return {ok:false, reason:'No date found in QR'};
  
  let parts = dstr.split(/[\/\-]/).map(p=>p.trim());
  let d, m, y;
  
  // Try M/D/YYYY first (US format)
  m = +parts[0];
  d = +parts[1];
  y = +parts[2];
  
  if(y < 100) y += 2000;
  
  const dt = new Date(y, m-1, d);
  if(isNaN(dt.getTime()) || dt.getDate()!==d || (dt.getMonth()+1)!==m){
    return {ok:false, reason:'Invalid date'};
  }
  
  const today = new Date(); today.setHours(0,0,0,0);
  const diffDays = (today - dt)/(1000*3600*24);
  
  if(diffDays < -1) return {ok:false, reason:'DC date is in the future', dt};
  if(diffDays > 90) return {ok:false, reason:'DC date is older than 90 days', dt};
  
  return {ok:true, dt};
}

/* ---------- scanner ---------- */
document.getElementById('btn-scan').addEventListener('click', startScanner);
document.getElementById('btn-close-scanner').addEventListener('click', stopScanner);

function startScanner(){
  document.getElementById('scanner-overlay').classList.add('active');
  html5QrCode = new Html5Qrcode("qr-reader");
  html5QrCode.start(
    { facingMode: "environment" },
    { fps: 10, qrbox: 240 },
    (decodedText)=>{
      onScanSuccess(decodedText);
    },
    ()=>{ /* ignore per-frame errors */ }
  ).catch(err=>{
    toast('Camera error');
    document.getElementById('scanner-overlay').classList.remove('active');
  });
}

function stopScanner(){
  if(html5QrCode){
    html5QrCode.stop().then(()=>html5QrCode.clear()).catch(()=>{});
  }
  document.getElementById('scanner-overlay').classList.remove('active');
}

function onScanSuccess(text){
  stopScanner();
  const parsed = parseDcText(text);
  const dateCheck = validateDate(parsed.date);
  pendingScan = { ...parsed, dateCheck };
  showConfirmSlip();
}

function showConfirmSlip(){
  const u = LS.get('dc_user');
  const { dc, date, dateCheck } = pendingScan;
  const valid = dc && dateCheck.ok;
  const outwardNum = direction === 'OUT' ? generateOutwardNumber() : null;
  
  const slip = document.getElementById('slip-content');
  slip.innerHTML = `
    <h3>${direction==='OUT' ? 'Gate Out Slip' : 'Gate In Slip'}</h3>
    <div class="big-stamp" style="color:${direction==='OUT'?'var(--stamp-out)':'var(--stamp-in)'}">${direction}</div>
    <div class="row"><span class="k">DC Number</span><span class="v">${dc || '— not found —'}</span></div>
    <div class="row"><span class="k">DC Date</span><span class="v ${dateCheck.ok?'':'warn'}">${date || '— not found —'}</span></div>
    ${outwardNum ? `<div class="row"><span class="k">Outward #</span><span class="v">${outwardNum}</span></div>` : ''}
    <div class="row"><span class="k">Status</span><span class="v ${valid?'':'warn'}">${valid ? 'Valid' : dateCheck.reason || 'DC unreadable'}</span></div>
    <div class="row"><span class="k">Scanned by</span><span class="v">${u.name}</span></div>
    <div class="row"><span class="k">Device</span><span class="v">${deviceId()}</span></div>
    <div class="row"><span class="k">Time</span><span class="v">${new Date().toLocaleString()}</span></div>
    <div class="slip-actions">
      <button class="btn-confirm" id="slip-confirm">${direction==='OUT'?'OUTWARD':'INWARD'}</button>
    </div>
  `;
  document.getElementById('confirm-overlay').classList.add('active');
  document.getElementById('slip-confirm').addEventListener('click', confirmLog);
}

function confirmLog(){
  const u = LS.get('dc_user');
  const outwardNum = direction === 'OUT' ? generateOutwardNumber() : null;
  
  const entry = {
    id: Date.now() + '-' + Math.random().toString(36).slice(2,7),
    dc: pendingScan.dc || 'UNREADABLE',
    date: pendingScan.date || '',
    valid: !!(pendingScan.dc && pendingScan.dateCheck.ok),
    direction,
    outwardNum,
    employeeName: u.name,
    deviceId: deviceId(),
    timestamp: new Date().toISOString(),
    synced: false
  };
  
  const log = LS.get('dc_log', []);
  log.unshift(entry);
  LS.set('dc_log', log);

  const queue = LS.get('dc_queue', []);
  queue.push(entry);
  LS.set('dc_queue', queue);

  document.getElementById('confirm-overlay').classList.remove('active');
  pendingScan = null;
  toast(`${direction} Logged: ${entry.dc}`);
  updateSyncStatus();
  trySync();
}

/* ---------- sync to google sheet ---------- */
async function trySync(){
  if(SHEET_URL === 'YOUR_GOOGLE_APPS_SCRIPT_URL_HERE') return;
  
  const queue = LS.get('dc_queue', []);
  if(queue.length === 0) return;
  
  const remaining = [];
  for(const entry of queue){
    try{
      await fetch(SHEET_URL, {
        method:'POST',
        mode:'no-cors',
        headers:{'Content-Type':'text/plain'},
        body: JSON.stringify(entry)
      });
      entry.synced = true;
    }catch(e){
      remaining.push(entry);
    }
  }
  
  LS.set('dc_queue', remaining);
  const log = LS.get('dc_log', []);
  LS.set('dc_log', log.map(l => ({...l, synced: l.synced || !remaining.find(r=>r.id===l.id)})));
  updateSyncStatus();
}

window.addEventListener('online', trySync);
setInterval(trySync, 30000); // Sync every 30 seconds

/* ---------- history ---------- */
function renderHistory(){
  const log = LS.get('dc_log', []);
  const el = document.getElementById('history-list');
  if(log.length===0){ el.innerHTML = '<div class="empty-note">No entries logged yet on this device.</div>'; return; }
  el.innerHTML = log.map(e=>`
    <div class="log-entry">
      <div>
        <div class="dc">${e.dc}</div>
        <div class="meta">${e.date || 'no date'} · ${e.employeeName} · ${new Date(e.timestamp).toLocaleString()}</div>
        ${e.outwardNum ? `<div class="meta">Outward: ${e.outwardNum}</div>` : ''}
      </div>
      <span class="tag ${e.direction==='OUT'?'out':'in'}">${e.direction}</span>
    </div>
  `).join('');
}

/* ---------- boot ---------- */
function boot(){
  refreshWhoLabel();
  paintDirection();
  updateSyncStatus();
  document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
  document.getElementById('screen-home').classList.add('active');
  trySync();
}

(function init(){
  const u = LS.get('dc_user');
  if(u){
    boot();
  } else {
    showScreen('login');
  }
  if('serviceWorker' in navigator){
    navigator.serviceWorker.register('sw.js').catch(()=>{});
  }
})();
</script>
</body>
</html>
